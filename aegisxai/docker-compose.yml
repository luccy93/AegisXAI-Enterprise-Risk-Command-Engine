version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: aegisxai/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - aegisxai/.env
    volumes:
      - aegisxai_data:/app/aegisxai/data
      - aegisxai_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "aegisxai/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    labels:
      - "aegisxai.component=streamlit"
      - "aegisxai.version=4.0.0"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aegisxai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  aegisxai_data:
  aegisxai_logs:
